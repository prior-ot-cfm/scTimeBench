datasets:
  - name: SuoDataset
    data_path: ../data/suo/main.h5ad
    preprocessed_dir: ../data/preprocessed/
    # note: these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: NaiveSplitDatasetFilter
        train_pct: 0.8

  - name: GarciaAlonsoDataset
    data_path: ../data/garcia-alonso/human_germ.h5ad
    preprocessed_dir: ../data/preprocessed/
    # these filters need to be in order!
    filters:
      - name: NaiveSplitDatasetFilter
        train_pct: 0.8
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt

  - name: GarciaAlonsoDataset
    data_path: ../data/garcia-alonso/human_germ.h5ad
    preprocessed_dir: ../data/preprocessed/
    # these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: NaiveSplitDatasetFilter
        train_pct: 0.8

model:
  name: ExampleRandomSampler
  train_and_test_script: ./examples/ExampleRandomSampler/train_and_test.sh

metrics:
 - L1Norm
 - GraphEditDistance
