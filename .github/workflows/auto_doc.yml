name: Build and Deploy Sphinx Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'assets/csv_results/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme
          pip install -e ".[benchmark]"

      - name: Copy CSV files to docs static
        run: |
          mkdir -p docs/source/_static/leaderboard
          rm -f docs/source/_static/leaderboard/*.csv
          shopt -s nullglob
          csv_files=(assets/csv_results/*.csv)
          if [ ${#csv_files[@]} -eq 0 ]; then
            echo "No CSV files found in assets/csv_results/."
          else
            cp "${csv_files[@]}" docs/source/_static/leaderboard/
          fi

      - name: Regenerate plots from CSV
        run: |
          scTimeBench --config configs/cooccurrence.yaml --plot_from_csv --csv_dir assets/csv_results --plot_output_dir plots

      - name: Copy plots to docs static
        run: |
          mkdir -p docs/source/_static/leaderboard/plots
          rm -f docs/source/_static/leaderboard/plots/*.svg
          shopt -s nullglob
          plot_files=(plots/*.svg)
          if [ ${#plot_files[@]} -eq 0 ]; then
            echo "No plot SVG files found in plots/."
          else
            cp "${plot_files[@]}" docs/source/_static/leaderboard/plots/
          fi

      - name: Build Sphinx HTML
        run: |
          sphinx-build -b html docs/source docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
