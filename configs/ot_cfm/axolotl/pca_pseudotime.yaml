datasets:
  - tag: defaultArtista

method:
  name: ot_cfm
  train_and_test_script: ./methods/ot_cfm/train_and_test.sh
  metadata:
    method: 'prior'
    prior_method: 'pseudotime_gaussian'
    reg: 0.3
    embedding_space: 'PCA'

metrics:
  - name: GraphSimMetric
    trajectory_infer_model:
      name: CellTypist
      renormalize: True
