# this defines the default datasets and group-specific defaults for metrics
#### Core Embeddings/Cell Ontology Datasets ####
datasets:
  - name: SuoDataset
    tag: defaultSuo
    data_path: ./data/suo/main.h5ad
    # note: these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonso
    data_path: ./data/garcia-alonso/human_germ.h5ad
    # these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: MaDataset
    tag: defaultMa
    data_path: ./data/ma/ma.h5ad
     # these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/pancreas/trunk_lineage.txt
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoPseudotimeEvenCells
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        num_tps: 15
      - name: CopySplitFilter

  - name: SuoDataset
    tag: defaultSuoPseudotimeEvenCells
    data_path: ./data/suo/main.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        num_tps: 15
      - name: CopySplitFilter

### Core Gene Expression Prediction Datasets ###
  - name: MaDataset
    tag: EasyMa
    data_path: ./data/ma/ma.h5ad
     # these filters need to be in order!
    filters:
      - name: TimeSplitDatasetFilter
        test_tps: [1,3,4]

  - name: OlaniruDataset
    tag: EasyOlaniru
    data_path: ./data/olaniru/olaniru.h5ad
     # these filters need to be in order!
    filters:
      - name: TimeSplitDatasetFilter
        test_tps: [1,3,4]

  - name: MaOlaniruDataset
    tag: EasyMaOlaniru
    data_path: ./data/maolaniru/maolaniru.h5ad
     # these filters need to be in order!
    filters:
      - name: TimeSplitDatasetFilter
        test_tps: [1,3,4]

  - name: ZebrafishDataset
    tag: EasyZebrafish
    data_path: ./data/ZB/zebrafish.h5ad
     # these filters need to be in order!
    filters:
      - name: TimeSplitDatasetFilter
        test_tps: [1,3]

  - name: DrosophilaDataset
    tag: EasyDrosophila
    data_path: ./data/DR/drosophila.h5ad
     # these filters need to be in order!
    filters:
      - name: TimeSplitDatasetFilter
        test_tps: [1,3]

  - name: MEFDataset
    tag: EasyMEF
    data_path: ./data/MEF/mef.h5ad
     # these filters need to be in order!
    filters:
      - name: TimeSplitDatasetFilter
        test_tps: [1,3]

#### Metric-specific Defaults ####
metric_groups:
  embeddings:
    dataset_tags:
      - defaultSuo
      - defaultGarciaAlonso
      - defaultMa
  ontology_based:
    dataset_tags:
      - defaultSuo
      - defaultGarciaAlonso
      - defaultMa
      - defaultGarciaAlonsoPseudotimeEvenCells
      - defaultSuoPseudotimeEvenCells
  gex_prediction:
    dataset_tags:
      - EasyMa
