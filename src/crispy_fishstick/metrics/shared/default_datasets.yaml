#### Metric-specific Defaults ####
metric_groups:
  embeddings:
    dataset_tags:
      - defaultSuo
      - defaultGarciaAlonso
      - defaultMa
  ontology_based:
    dataset_tags:
      - defaultSuo
      - defaultGarciaAlonso
      - defaultMa
      - defaultGarciaAlonsoPseudotimeEvenCells
      - defaultSuoPseudotimeEvenCells
      - defaultMaPseudotimeEvenCells
  gex_prediction:
    dataset_tags:
      - EasyZebrafish
      - MediumZebrafish
      - HardZebrafish
      - EasyDrosophila
      - MediumDrosophila
      - HardDrosophila
      - EasyMEF
      - MediumMEF
      - HardMEF
      - EasyMa
      - MediumMa
      - HardMa
      - EasyOlaniru
      - MediumOlaniru
      - HardOlaniru
      - EasyMaOlaniru
      - MediumMaOlaniru
      - HardMaOlaniru
