# this defines the default datasets and group-specific defaults for metrics
#### Core Embeddings/Cell Ontology Datasets ####
datasets:
  - name: SuoDataset
    tag: defaultSuo
    data_path: ./data/suo/main.h5ad
    # note: these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonso
    data_path: ./data/garcia-alonso/human_germ.h5ad
    # these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: MaDataset
    tag: defaultMa
    data_path: ./data/ma/ma.h5ad
     # these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/pancreas/trunk_lineage.txt
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoPseudotimeEvenCells
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        num_tps: 15
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: SuoDataset
    tag: defaultSuoPseudotimeEvenCells
    data_path: ./data/suo/main.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        num_tps: 15
      - name: LogNormFilter
      - name: CopySplitFilter

  - name: MaDataset
    tag: defaultMaPseudotimeEvenCells
    data_path: ./data/ma/ma.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/pancreas/trunk_lineage.txt
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        num_tps: 10
      - name: LogNormFilter
      - name: CopySplitFilter


