# this defines the optional datasets that can be used for ontology-based metrics
datasets:
  - name: SuoDataset
    tag: defaultSuoPsupertime
    data_path: ./data/suo/main.h5ad
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: RoundingFilter
        round_to_k: 1
      - name: PsupertimeFilter
        preprocess_type: hvg
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoPsupertime
    data_path: ./data/garcia-alonso/human_germ.h5ad
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        round_to_k: 1
      - name: PsupertimeFilter
        preprocess_type: hvg
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoSceptic
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: ScepticFilter
        preprocess_type: hvg
      - name: RoundingFilter
        round_to_k: 1
      - name: CopySplitFilter

  - name: SuoDataset
    tag: defaultSuoSceptic
    data_path: ./data/suo/main.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/b_cells/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: ScepticFilter
        preprocess_type: pca
      - name: RoundingFilter
        round_to_k: 1
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoSceptic
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: ScepticFilter
        preprocess_type: pca
      - name: RoundingFilter
        round_to_k: 1
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoPseudotimeEvenTps
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        num_tps: 15
        even_cells_per_tp: false
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoPseudotimeMinCells
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: RoundingFilter
        min_cells_per_timepoint: 10
      - name: PseudotimeFilter
        preprocess_type: zheng_hvg
      - name: RoundingFilter
        min_cells_per_timepoint: 400
      - name: CopySplitFilter

  - name: GarciaAlonsoDataset
    tag: EasyGarciaAlonso
    data_path: ./data/garcia-alonso/human_germ.h5ad
    # these filters need to be in order!
    filters:
      - name: LineageDatasetFilter
        cell_lineage_file: ./examples/cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./examples/cell_lineages/germ/equal_names.txt
      - name: TimeSplitDatasetFilter
        test_tps: [1,3]
        use_time_indices: true
